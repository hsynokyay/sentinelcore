services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sentinelcore
      POSTGRES_USER: sentinelcore
      POSTGRES_PASSWORD: dev-password
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "sentinelcore"]
      interval: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-c", "/etc/nats/nats.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./nats.conf:/etc/nats/nats.conf
      - natsdata:/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  # --- Application Services ---

  db-migrate:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE: cli
    command: ["echo", "migrations would run here"]
    # In a real setup we'd use golang-migrate CLI, for now
    # migrations are run by the controlplane on startup
    depends_on:
      postgres:
        condition: service_healthy

  controlplane:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE: controlplane
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: sentinelcore
      DB_USER: sentinelcore
      DB_PASSWORD: dev-password
      NATS_URL: nats://nats:4222
      REDIS_URL: redis://redis:6379
      POLICY_ENGINE_URL: http://policy-engine:9006
      MSG_SIGNING_KEY: dev-signing-key-change-me
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      redis:
        condition: service_healthy
      policy-engine:
        condition: service_started
      audit-service:
        condition: service_started

  policy-engine:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE: policy-engine
    ports:
      - "9006:9006"
    environment:
      POLICY_ENGINE_PORT: "9006"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: sentinelcore
      DB_USER: sentinelcore
      DB_PASSWORD: dev-password
    depends_on:
      postgres:
        condition: service_healthy

  audit-service:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE: audit-service
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: sentinelcore
      DB_USER: sentinelcore
      DB_PASSWORD: dev-password
      NATS_URL: nats://nats:4222
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started

  sast-worker:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE: sast-worker
    environment:
      NATS_URL: nats://nats:4222
      RULES_PATH: /rules/sast-patterns.json
      MSG_SIGNING_KEY: dev-signing-key-change-me
    volumes:
      - ../../rules/builtin/sast-patterns.json:/rules/sast-patterns.json:ro
    depends_on:
      nats:
        condition: service_started

  vuln-intel:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE: vuln-intel
    ports:
      - "9003:9003"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: sentinelcore
      DB_USER: sentinelcore
      DB_PASSWORD: dev-password
    depends_on:
      postgres:
        condition: service_healthy

  updater:
    build:
      context: ../..
      dockerfile: Dockerfile
      args:
        SERVICE: updater
    ports:
      - "9009:9009"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: sentinelcore
      DB_USER: sentinelcore
      DB_PASSWORD: dev-password
      TRUST_DIR: /var/lib/sentinelcore/trust
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  natsdata:
  miniodata:
