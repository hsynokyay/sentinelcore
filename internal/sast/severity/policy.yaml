# SentinelCore severity policy — single source of truth for the
# vuln_class → (severity, SLA, compliance) mapping.
#
# Sprint 1.3 P1-3 / roadmap §1.3 — ships the data file + loader; engine
# adoption (read severity from here instead of from per-rule JSON) is a
# follow-up PR so this change is purely additive at deploy time.
#
# Compliance hooks the field-level mapping intentionally:
#   - bddk_critical: true  → 24-hour remediation SLA per BDDK Bilgi
#     Sistemleri Yönetmeliği "kritik açık" tanımı. Maps to severity
#     critical PLUS the SLA expectation that downstream alerting must
#     enforce. A finding can be severity=critical without bddk_critical
#     if it does not directly enable a banking-impact path (e.g. crypto
#     weakness in a non-cardholder flow); use deliberately.
#   - pci_dss: [...]  → list of PCI-DSS Requirement 6.5.x sub-clauses
#     that this vuln_class evidences. Used by the compliance scorecard
#     export to demonstrate Req 6.5 coverage.
#   - swift_csp: [...] → list of SWIFT Customer Security Programme
#     control numbers (e.g. "2.7" = Vulnerability Scanning). SAST
#     findings fall under 2.7 broadly; specific cross-references are
#     enumerated per class where a tighter mapping exists.
#
# Adding a new vuln_class:
#   1. Add the constant to internal/sast/vulnclass/vulnclass.go.
#   2. Add an entry here. The severity_test will fail otherwise — the
#      cross-validation test asserts policy.yaml keys == vulnclass.All().
#   3. Document the compliance rationale in the entry's comment if it
#      is non-obvious.

version: 1

