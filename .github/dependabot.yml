version: 2

# Phase 8 Wave 3 — automated dependency updates. Weekly cadence so
# the review burden stays manageable; security updates are exempt
# from the weekly limit.

updates:
  # Backend Go modules.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    # Group non-security patch-level bumps into one PR to reduce churn.
    groups:
      patch-updates:
        update-types: ["patch"]

  # Frontend npm.
  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps-frontend)"
      include: "scope"
    groups:
      patch-updates:
        update-types: ["patch"]

  # Base images in the Dockerfile.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps-docker)"

  # GitHub Actions themselves.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps-actions)"
