name: release

# Phase 8 Wave 3 — release pipeline. Fires on version tags (vX.Y.Z).
#
# For each service:
#   1. Build multi-arch image
#   2. Push to GHCR
#   3. Sign with cosign keyless (GitHub OIDC, no long-lived key)
#   4. Generate CycloneDX SBOM, attach to the image
#
# Customer verification:
#   $ cosign verify \
#       --certificate-identity-regexp '^https://github\.com/hsynokyay/sentinelcore/' \
#       --certificate-oidc-issuer https://token.actions.githubusercontent.com \
#       ghcr.io/hsynokyay/sentinelcore/controlplane:vX.Y.Z

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write    # push to ghcr.io
  id-token: write    # cosign keyless

jobs:
  build-sign-sbom:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service:
          - controlplane
          - audit-service
          - sast-worker
          - dast-worker
          - notification-worker
          - retention-worker
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: install cosign
        uses: sigstore/cosign-installer@v3

      - name: install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: image meta
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/sentinelcore/${{ matrix.service }}"
          TAG="${GITHUB_REF#refs/tags/}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"     >> "$GITHUB_OUTPUT"
          echo "ref=${IMAGE}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: build + push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          build-args: |
            SERVICE=${{ matrix.service }}
          tags: |
            ${{ steps.meta.outputs.ref }}
            ${{ steps.meta.outputs.image }}:latest
          push: true
          provenance: true      # SLSA provenance attestation via buildx
          sbom: false            # we generate below with syft separately

      - name: cosign sign
        # --yes suppresses the "this will be recorded in rekor" prompt.
        # Keyless signing uses the workflow's OIDC token, recorded in
        # the public Rekor transparency log. Verifiable with no key.
        run: |
          cosign sign --yes "${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: syft SBOM
        run: |
          syft "${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}" \
            -o cyclonedx-json="${{ matrix.service }}.cdx.json"

      - name: cosign attach + sign SBOM
        run: |
          cosign attach sbom --sbom "${{ matrix.service }}.cdx.json" \
            "${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}"
          cosign sign --yes --attachment sbom \
            "${{ steps.meta.outputs.image }}@${{ steps.build.outputs.digest }}"

      - name: upload SBOM to release
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}-${{ steps.meta.outputs.tag }}
          path: '${{ matrix.service }}.cdx.json'
          retention-days: 365
